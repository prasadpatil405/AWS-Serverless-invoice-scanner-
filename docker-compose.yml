version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
    restart: always

# Note: Integration with LocalStack or similar could be added here
# for local AWS development, but for now, we focus on the frontend container.
